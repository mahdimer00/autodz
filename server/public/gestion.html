<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>لوحة التحكم - AutoDz Vip</title>
  <style>
    :root {
      --navy: #0b2545;
      --orange: #ff7a1a;
      --silver: #f1f4f8;
      --border: #e6eaf0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
      background: var(--silver);
      color: var(--navy);
    }
    header {
      background: var(--navy);
      color: #fff;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    header h1 { font-size: 18px; margin: 0; }
    section { margin: 20px; }
    h2 { font-size: 15px; margin: 0 0 10px; }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 10px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      text-align: center;
    }
    .stat-card .num { font-size: 22px; font-weight: 800; color: var(--navy); }
    .stat-card .label { font-size: 12px; color: #6b7280; margin-top: 4px; }
    .card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
    }
    label { display: block; font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    input[type="text"], input[type="email"], input[type="search"] {
      width: 100%;
      padding: 9px 12px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 14px;
    }
    button {
      background: var(--orange);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { opacity: 0.9; }
    .toolbar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .toolbar input { flex: 1; min-width: 200px; }
    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border-radius: 14px;
      border: 1px solid var(--border);
    }
    table { border-collapse: collapse; width: 100%; min-width: 900px; }
    th, td {
      padding: 10px 12px;
      text-align: right;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      white-space: nowrap;
    }
    th { background: var(--silver); font-weight: 700; position: sticky; top: 0; }
    td.notes { white-space: normal; max-width: 220px; }
    select {
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 13px;
    }
    .muted { color: #6b7280; font-size: 13px; }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge.sent { background: #dcfce7; color: #15803d; }
    .badge.notsent { background: #fee2e2; color: #b91c1c; }
    .save-msg { font-size: 13px; margin-right: 10px; }
    .logout-btn { background: rgba(255,255,255,0.1); }
    #login-screen {
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    #login-screen .card { width: 100%; max-width: 360px; }
    #login-screen h1 { font-size: 18px; margin: 0 0 16px; text-align: center; }
    #login-screen input { margin-bottom: 10px; }
    #login-error { color: #b91c1c; font-size: 13px; min-height: 18px; margin-bottom: 8px; }
    #app { display: none; }
  </style>
</head>
<body>
  <div id="login-screen">
    <form class="card" id="login-form">
      <h1>تسجيل الدخول للوحة التحكم</h1>
      <label>اسم المستخدم</label>
      <input type="text" id="login-username" autocomplete="username" required />
      <label>كلمة المرور</label>
      <input type="password" id="login-password" autocomplete="current-password" required />
      <p id="login-error"></p>
      <button type="submit" style="width:100%;">دخول</button>
    </form>
  </div>

  <div id="app">
    <header>
      <h1>لوحة تحكم AutoDz Vip</h1>
      <div style="display:flex; align-items:center; gap:10px;">
        <span id="count" class="muted" style="color:#cbd5e1;"></span>
        <button id="logout" class="logout-btn">خروج</button>
      </div>
    </header>

    <section>
      <h2>إحصائيات</h2>
      <div class="stats-grid" id="stats"></div>
    </section>

    <section>
      <h2>معلومات التواصل</h2>
      <div class="card">
        <div class="contact-grid">
          <div>
            <label>رقم الهاتف / واتساب</label>
            <input type="text" id="ci-phone" placeholder="0770589042" />
          </div>
          <div>
            <label>البريد الإلكتروني</label>
            <input type="email" id="ci-email" placeholder="contact@autodzvip.com" />
          </div>
          <div>
            <label>فيسبوك</label>
            <input type="text" id="ci-facebook" placeholder="https://facebook.com/..." />
          </div>
          <div>
            <label>إنستغرام</label>
            <input type="text" id="ci-instagram" placeholder="https://instagram.com/..." />
          </div>
          <div>
            <label>تيك توك</label>
            <input type="text" id="ci-tiktok" placeholder="https://tiktok.com/@..." />
          </div>
        </div>
        <div style="margin-top:12px; display:flex; align-items:center;">
          <button id="save-contact">حفظ المعلومات</button>
          <span id="save-msg" class="save-msg"></span>
        </div>
      </div>
    </section>

    <section>
      <h2>الطلبات</h2>
      <div class="toolbar">
        <input type="search" id="search" placeholder="ابحث بالاسم، الهاتف، السيارة، القطعة..." />
        <button id="refresh">تحديث</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>التاريخ</th>
              <th>الاسم</th>
              <th>الهاتف</th>
              <th>الولاية</th>
              <th>السيارة</th>
              <th>السنة</th>
              <th>المحرك</th>
              <th>القطعة</th>
              <th>الحالة المطلوبة</th>
              <th>ملاحظات</th>
              <th>تيليجرام</th>
              <th>الحالة</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <p id="empty" class="muted" style="padding:20px;" hidden>لا توجد طلبات مطابقة.</p>
      </div>
    </section>
  </div>

  <script src="/gestion.js" defer></script>
</body>
</html>
