[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Proxy the admin dashboard through to the backend on the VPS so it's
# reachable at autodz.vip/gestion instead of only api.autodz.vip/gestion.
# Status 200 makes this a transparent proxy (URL stays autodz.vip in the
# browser) rather than a redirect.
[[redirects]]
  from = "/gestion"
  to = "https://api.autodz.vip/gestion"
  status = 200

[[redirects]]
  from = "/gestion.js"
  to = "https://api.autodz.vip/gestion.js"
  status = 200

[[redirects]]
  from = "/api/gestion/*"
  to = "https://api.autodz.vip/api/gestion/:splat"
  status = 200

[[redirects]]
  from = "/api/contact-info"
  to = "https://api.autodz.vip/api/contact-info"
  status = 200

# Never let Netlify's edge cache these proxied, authenticated responses —
# its cache key ignores the Authorization header, so a cached 401 (or a
# cached admin response) would otherwise be served to every visitor.
[[headers]]
  for = "/gestion*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/api/gestion/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/api/contact-info"
  [headers.values]
    Cache-Control = "no-store"
