# Nginx reverse proxy for the AutoDz Vip backend API.
# Copy to /etc/nginx/sites-available/api.autodz.vip and symlink into sites-enabled.
# Run certbot afterwards to add the SSL server block automatically:
#   sudo certbot --nginx -d api.autodz.vip

server {
    listen 80;
    server_name api.autodz.vip;

    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
